name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-app:
    name: Build test-app
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.4

    defaults:
      run:
        working-directory: test-app
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Expose .swift-version at workspace root
        working-directory: ${{ github.workspace }}
        run: cp test-app/.swift-version .

      - name: Install Swift toolchain
        uses: swiftlang/swift-embedded-examples/.github/actions/install-swift@199afd52440398840a05763a641453503a75896c

      - name: Verify Swift compiler
        run: swiftc --version

      - name: Build test-app
        run: |
          . "$IDF_PATH/export.sh"
          idf.py set-target esp32c6
          idf.py build
